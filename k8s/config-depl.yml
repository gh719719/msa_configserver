apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-deployment
  namespace: lgcns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
      - name: config-server
        image: 414901227428.dkr.ecr.ap-northeast-2.amazonaws.com/configserver:latest
        ports:
        - containerPort: 8888
        env:
        - name: SPRING_CLOUD_CONFIG_SERVER_GIT_URI
          value: "https://github.com/gh719719/config-repo.git" # 실제 설정파일이 저장된 Git 주소
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: lgcns
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888