name: deploy configserver

on:
  push:
    branches: [ "main" ] # configserver 코드가 푸시될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. Jar 빌드
      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew bootJar

      # 2. AWS 인증 (Secrets는 이 저장소에도 등록해주셔야 합니다)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ap-northeast-2

      # 3. ECR 로그인 및 이미지 푸시
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: configserver # ECR에 미리 생성해둔 레포 이름
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. EKS 배포
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-northeast-2 --name lgcns-gh719719-cluster

      - name: Deploy to EKS
        run: |
          # configserver 폴더 내에 k8s 폴더가 있다고 가정
          kubectl apply -f ./k8s/configserver-depl.yml
          kubectl rollout restart deployment config-deployment -n lgcns